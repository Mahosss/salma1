<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eve - Laila's Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0f0c29; 
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
            position: relative; /* Essential for floating elements */
            overflow: hidden; /* Keep particles within bounds */
        }

        /* كارت ليلى: داكن ومستطيل مع حواف حادة قليلاً ليعطي طابعاً مختلفاً */
        .laila-card {
            width: 100%; max-width: 500px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 30px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            z-index: 2; /* Keep card above particles */
            position: relative;
        }

        .header-section { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        
        /* الصورة الشخصية مع تأثير لمعان مسح ساطع */
        .avatar-box { 
            width: 320px; height: 100px; border-radius: 20px; 
            overflow: hidden; border: 2px solid #7000ff;
            box-shadow: 0 0 15px rgba(112, 0, 255, 0.5);
            position: relative; /* for absolute sheen element */
        }
        
        .avatar-box::after {
            content: "";
            position: absolute;
            top: -100%;
            left: -100%;
            width: 50%;
            height: 200%;
            background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(30deg);
            animation: imageGlance 3s infinite linear;
        }

        @keyframes imageGlance {
            0% { top: -100%; left: -100%; }
            100% { top: 100%; left: 100%; }
        }

        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* الاسم مع تأثير لمعان متدرج متحرك */
        .name-box h1 { 
            font-size: 1.8rem; 
            background: linear-gradient(-60deg, #fff 0%, #fff 20%, #a0a0ff 30%, #fff 40%, #fff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: textSheen 2s ease infinite;
            background-size: 200% auto;
        }

        @keyframes textSheen {
            0% { background-position: 100% top; }
            100% { background-position: 0% top; }
        }

        .name-box p { color: #a0a0ff; font-size: 0.9rem; }

        /* مشغل الصوت بنمط داكن */
        .player-box { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 25px; }
        .track-info { margin-bottom: 15px; text-align: center; font-size: 0.9rem; }
        
        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; font-size: 1.4rem; }
        .play-btn { 
            width: 50px; height: 50px; background: #7000ff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: 0.3s;
        }
        .play-btn:hover { background: #9d4edd; transform: scale(1.1); }

        .progress-container { width: 100%; height: 6px; background: #333; border-radius: 10px; margin: 20px 0; cursor: pointer; }
        .progress-bar { width: 0%; height: 100%; background: #7000ff; border-radius: 10px; }

        /* القائمة: شكل مختلف (قائمة داكنة بحدود خفيفة) */
        .playlist { margin-top: 20px; }
        .song-item { 
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; cursor: pointer;
        }
        .song-item:hover { color: #7000ff; }

        /* جزيئات الخلفية المتطايرة */
        .particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1; /* Below card */
        }

        .butterfly, .flower {
            position: absolute;
            font-size: 20px; /* Base size */
            color: rgba(255, 255, 255, 0.7); /* Base semi-transparent */
            animation: flying linear infinite;
            opacity: 0; /* Starts hidden, fades in */
        }

        @keyframes flying {
            0% { transform: translateY(0vh) translateX(0vw) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-120vh) translateX(20vw) rotate(180deg); opacity: 0; }
        }

        /* Randomize particle properties with child selectors and different animations */
        /* Butterflies */
        .butterfly:nth-child(1) { left: 10%; font-size: 24px; color: rgba(255,200,255,0.8); animation-duration: 15s; animation-delay: 1s; }
        .butterfly:nth-child(2) { left: 30%; font-size: 18px; color: rgba(200,255,255,0.6); animation-duration: 20s; animation-delay: 3s; }
        .butterfly:nth-child(3) { left: 50%; font-size: 22px; color: rgba(255,255,200,0.7); animation-duration: 18s; animation-delay: 5s; }
        .butterfly:nth-child(4) { left: 70%; font-size: 20px; color: rgba(200,200,255,0.8); animation-duration: 22s; animation-delay: 2s; }
        .butterfly:nth-child(5) { left: 90%; font-size: 26px; color: rgba(255,220,220,0.6); animation-duration: 16s; animation-delay: 4s; }
        /* Flowers */
        .flower:nth-child(6) { left: 20%; font-size: 28px; color: rgba(255,180,255,0.9); animation-duration: 25s; animation-delay: 0s; animation-name: floatingDown; }
        .flower:nth-child(7) { left: 40%; font-size: 22px; color: rgba(255,255,180,0.7); animation-duration: 30s; animation-delay: 6s; animation-name: floatingDown; }
        .flower:nth-child(8) { left: 60%; font-size: 26px; color: rgba(180,255,255,0.8); animation-duration: 28s; animation-delay: 2s; animation-name: floatingDown; }
        .flower:nth-child(9) { left: 80%; font-size: 30px; color: rgba(255,200,180,0.9); animation-duration: 32s; animation-delay: 8s; animation-name: floatingDown; }

        @keyframes floatingDown {
            0% { transform: translateY(-100vh) translateX(0vw) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(120vh) translateX(-20vw) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="particle-container">
        <span class="butterfly">🦋</span>
        <span class="butterfly">🦋</span>
        <span class="butterfly">🦋</span>
        <span class="butterfly">🦋</span>
        <span class="butterfly">🦋</span>
        <span class="flower">🌹</span>
        <span class="flower">🌹</span>
        <span class="flower">🌹</span>
        <span class="flower">🌹</span>
    </div>

    <div class="laila-card">
        <div class="header-section">
            <div class="avatar-box"><img src="https://xatimg.com/image/YqjKEtyM2jfU.jpg"></div>
            <div class="name-box">
                <h1>Eve</h1>
                <p>أنتِ لستِ مجرد شخص عابر في الحياه، أنتِ التفاصيل اللطيفة التي تجعل هذا العالم يبدو أجمل. لا يشئ يشبه هدوء روحكِ وجمال ضحكتكِ.. دمتِ شيئاً جميلاً لا ينتهي. </p>
            </div>
        </div>

        <div class="player-box">
            <div class="track-info" id="trackTitle">اختر أغنية للبدء</div>
            <div class="progress-container" id="progCont"><div class="progress-bar" id="progBar"></div></div>
            <div class="controls">
                <i class="fas fa-backward" id="prev"></i>
                <div class="play-btn" id="play"><i class="fas fa-play" id="icon"></i></div>
                <i class="fas fa-forward" id="next"></i>
            </div>
        </div>

        <div class="playlist" id="list">
            </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const songs = [
            { title: "ليالي هادئة", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { title: "سكون النجوم", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" }
        ];
        
        let current = 0;
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play');
        const icon = document.getElementById('icon');
        const title = document.getElementById('trackTitle');
        const progBar = document.getElementById('progBar');
        const playlist = document.getElementById('list');

        function loadSong(idx) {
            audio.src = songs[idx].src;
            title.innerText = songs[idx].title;
            // Clear current list and highlight current song
            playlist.innerHTML = '';
            songs.forEach((song, i) => {
                const item = document.createElement('div');
                item.className = `song-item ${i === idx ? 'active-song' : ''}`;
                item.innerText = song.title;
                item.onclick = () => {
                    current = i;
                    loadSong(current);
                    audio.play();
                    icon.className = "fas fa-pause";
                };
                playlist.appendChild(item);
            });
        }

        playBtn.addEventListener('click', () => {
            if(audio.paused) { audio.play(); icon.className = "fas fa-pause"; }
            else { audio.pause(); icon.className = "fas fa-play"; }
        });

        audio.addEventListener('timeupdate', () => {
            const p = (audio.currentTime / audio.duration) * 100;
            progBar.style.width = p + "%";
        });

        document.getElementById('prev').onclick = () => {
            current = (current - 1 + songs.length) % songs.length;
            loadSong(current);
            audio.play();
            icon.className = "fas fa-pause";
        }

        document.getElementById('next').onclick = () => {
            current = (current + 1) % songs.length;
            loadSong(current);
            audio.play();
            icon.className = "fas fa-pause";
        }

        // تشغيل أول أغنية تلقائياً عند التحميل
        loadSong(0);

    </script>
</body>
</html>
